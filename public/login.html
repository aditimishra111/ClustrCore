<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – ClustrCore</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap');

    /* ── TOKENS (matches landing page exactly) ── */
    :root {
      --orange:#c8623a; --orange-l:#e08c4a; --orange-d:#a34c28;
      --blue:#3a6bc8; --blue-l:#6a9be8;
      --grad:linear-gradient(135deg, var(--orange) 0%, var(--orange-l) 50%, var(--blue) 100%);
      --grad-text:linear-gradient(90deg, var(--orange) 0%, var(--orange-l) 40%, var(--blue) 100%);

      --bg:#faf8f5; --bg2:#f2ede6; --bg3:#ebe4d9;
      --ink:#1a1410; --ink2:#4a3f35; --ink3:#8c7b6d;
      --card:#ffffff; --card2:rgba(255,255,255,0.75);
      --line:rgba(26,20,16,0.08); --line2:rgba(26,20,16,0.15);
      --sh1:0 1px 4px rgba(26,20,16,0.06),0 4px 16px rgba(26,20,16,0.06);
      --sh2:0 8px 32px rgba(26,20,16,0.10),0 2px 8px rgba(26,20,16,0.06);
      --sh3:0 24px 64px rgba(26,20,16,0.14),0 4px 16px rgba(26,20,16,0.08);
      --glow:rgba(200,98,58,0.18);
      --ease:cubic-bezier(0.4,0,0.2,1); --t:0.3s;
    }
    [data-theme="dark"] {
      --bg:#110e0b; --bg2:#1a1512; --bg3:#231e18;
      --ink:#f5f0ea; --ink2:#b5a898; --ink3:#6b5e52;
      --card:#1e1a15; --card2:rgba(30,26,21,0.85);
      --line:rgba(245,240,234,0.07); --line2:rgba(245,240,234,0.14);
      --sh1:0 1px 4px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.25);
      --sh2:0 8px 32px rgba(0,0,0,0.4),0 2px 8px rgba(0,0,0,0.3);
      --sh3:0 24px 64px rgba(0,0,0,0.55),0 4px 16px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.25rem;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      transition: background var(--t), color var(--t);
    }

    /* ── Cinematic noise texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ── Cinematic radial ambient bg ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 65% 55% at 85% 15%, rgba(200,98,58,0.11) 0%, transparent 60%),
        radial-gradient(ellipse 55% 65% at 10% 85%, rgba(58,107,200,0.09) 0%, transparent 55%),
        radial-gradient(ellipse 45% 45% at 45% 50%, rgba(224,140,74,0.06) 0%, transparent 50%);
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 3px; }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      position: fixed;
      top: 1.25rem; right: 1.25rem;
      z-index: 100;
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--line2);
      background: var(--card2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--ink2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      transition: all var(--t);
      box-shadow: var(--sh1);
    }
    .theme-toggle:hover { border-color: var(--orange); color: var(--orange); transform: scale(1.05); }

    /* ── BACK LINK ── */
    .back-link {
      position: fixed;
      top: 1.25rem; left: 1.25rem;
      z-index: 100;
      display: inline-flex; align-items: center; gap: 0.45rem;
      font-size: 0.82rem; font-weight: 500;
      color: var(--ink3);
      text-decoration: none;
      background: var(--card2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--line2);
      border-radius: 100px;
      padding: 0.45rem 1rem;
      box-shadow: var(--sh1);
      transition: all var(--t);
    }
    .back-link:hover { color: var(--orange); border-color: rgba(200,98,58,0.3); }

    /* ── MAIN CARD ── */
    .login-card {
      background: var(--card2);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--line2);
      border-radius: 28px;
      width: 100%;
      max-width: 460px;
      padding: 2.875rem 2.625rem;
      box-shadow: var(--sh3);
      position: relative;
      z-index: 2;
      animation: cardIn 0.7s var(--ease) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Gradient top edge */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--grad);
      border-radius: 28px 28px 0 0;
    }

    /* ── HEADER ── */
    .card-header {
      text-align: center;
      margin-bottom: 2.25rem;
    }

    .logo-eyebrow {
      display: inline-flex; align-items: center; gap: 0.45rem;
      background: var(--bg2); border: 1px solid var(--line2);
      border-radius: 100px; padding: 0.32rem 0.9rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--orange);
      margin-bottom: 1.125rem;
    }
    .logo-eyebrow::before {
      content: '';
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--orange);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.1rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 0.5rem;
    }
    .card-title .gradient-text {
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card-subtitle {
      font-size: 0.88rem;
      color: var(--ink3);
      font-weight: 300;
      line-height: 1.5;
    }

    /* ── ERROR BANNER ── */
    .error-msg {
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      font-size: 0.82rem;
      display: none;
      margin-bottom: 1.125rem;
      align-items: center;
      gap: 0.5rem;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      color: #ef4444;
    }
    .error-msg.show { display: flex; }

    /* ── FORM ── */
    .form-group { margin-bottom: 1.05rem; }

    .form-label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 0.4rem;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--ink3);
      font-size: 0.8rem;
      pointer-events: none;
      transition: color var(--t);
    }
    .input-wrap:focus-within .input-icon { color: var(--orange); }

    input[type="email"],
    input[type="password"],
    input[type="text"],
    select {
      width: 100%;
      padding: 0.72rem 1rem 0.72rem 2.4rem;
      background: var(--bg2);
      border: 1px solid var(--line2);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.87rem;
      color: var(--ink);
      outline: none;
      transition: all var(--t);
      appearance: none;
    }
    input::placeholder { color: var(--ink3); }
    input:focus, select:focus {
      border-color: var(--orange);
      background: var(--card);
      box-shadow: 0 0 0 3px rgba(200,98,58,0.1);
    }

    .toggle-pw {
      position: absolute;
      right: 11px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--ink3);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 4px;
      transition: color var(--t);
    }
    .toggle-pw:hover { color: var(--orange); }

    .forgot-row {
      text-align: right;
      margin-top: 0.4rem;
    }
    .forgot-row a {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--blue);
      text-decoration: none;
      transition: color var(--t);
    }
    .forgot-row a:hover { color: var(--orange); }

    /* ── ROLE CARDS ── */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-top: 0.4rem;
    }
    .role-card {
      border: 1px solid var(--line2);
      border-radius: 12px;
      padding: 0.875rem 0.5rem;
      text-align: center;
      cursor: pointer;
      transition: all var(--t);
      background: var(--bg2);
      position: relative;
      overflow: hidden;
    }
    .role-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--grad);
      transform: scaleX(0);
      transition: transform var(--t);
    }
    .role-card:hover {
      border-color: rgba(200,98,58,0.25);
      background: var(--card);
      transform: translateY(-1px);
    }
    .role-card.selected {
      border-color: var(--orange);
      background: var(--card);
      box-shadow: 0 0 0 3px rgba(200,98,58,0.1), var(--sh1);
    }
    .role-card.selected::after { transform: scaleX(1); }
    .role-card i {
      display: block;
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
      color: var(--ink3);
      transition: color var(--t);
    }
    .role-card.selected i { color: var(--orange); }
    .role-card span {
      font-family: 'DM Mono', monospace;
      font-size: 0.63rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink3);
      transition: color var(--t);
    }
    .role-card.selected span { color: var(--ink); }
    #role { display: none; }

    /* ── SUBMIT BUTTON ── */
    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      margin-top: 1.5rem;
      background: var(--grad);
      color: white;
      border: none;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t);
      box-shadow: 0 4px 20px rgba(200,98,58,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
    }
    .btn-submit::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity var(--t);
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,98,58,0.5);
    }
    .btn-submit:hover::before { opacity: 1; }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.65; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 0.875rem;
      margin: 1.5rem 0;
      color: var(--ink3);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--line2);
    }

    /* ── FOOTER LINK ── */
    .signup-row {
      text-align: center;
      color: var(--ink3);
      font-size: 0.85rem;
      font-weight: 300;
    }
    .signup-row a {
      color: var(--orange);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--t);
    }
    .signup-row a:hover { color: var(--blue); }

    /* ── SUCCESS OVERLAY ── */
    .success-overlay {
      position: absolute; inset: 0;
      background: var(--card2);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.875rem;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--t);
    }
    .success-overlay.show { opacity: 1; pointer-events: all; }
    .success-icon {
      width: 64px; height: 64px;
      background: rgba(58,156,90,0.1);
      border: 1px solid rgba(58,156,90,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; color: #3a9c5a;
      animation: successPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      box-shadow: 0 0 0 8px rgba(58,156,90,0.08);
    }
    @keyframes successPop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .success-overlay h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; font-weight: 700;
      color: var(--ink);
    }
    .success-overlay p { font-size: 0.85rem; color: var(--ink3); font-weight: 300; }

    @media (max-width: 480px) {
      .login-card { padding: 2.25rem 1.5rem; }
      .card-title { font-size: 1.75rem; }
    }
  </style>
</head>
<body>

  <!-- Theme toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <i class="fas fa-moon"></i>
  </button>

  <!-- Back link -->
  <a href="index.html" class="back-link">
    <i class="fas fa-arrow-left"></i> Back to home
  </a>

  <div class="login-card">

    <!-- Success overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-icon"><i class="fas fa-check"></i></div>
      <h3>Welcome back!</h3>
      <p>Redirecting you now…</p>
    </div>

    <!-- Header -->
    <div class="card-header">
      <div class="logo-eyebrow">Welcome Back</div>
      <h1 class="card-title">
        <span class="gradient-text">Sign In</span>
      </h1>
      <p class="card-subtitle">Continue to your ClustrCore account</p>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
      <i class="fas fa-circle-exclamation"></i>
      <span id="errorText">Please fill all fields.</span>
    </div>

    <form id="loginForm" autocomplete="off">

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input id="email" type="email" placeholder="you@example.com" required>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input id="password" type="password" placeholder="Enter your password" required>
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
            <i class="fas fa-eye" id="pwIcon"></i>
          </button>
        </div>
        <div class="forgot-row">
          <a href="#">Forgot Password?</a>
        </div>
      </div>

      <!-- Role -->
      <div class="form-group">
        <label class="form-label">Your Role</label>
        <select id="role" required>
          <option value="">Select Role</option>
          <option value="student">Student</option>
          <option value="team">Team</option>
          <option value="admin">Admin</option>
        </select>
        <div class="role-grid" id="roleGrid">
          <div class="role-card" data-role="student">
            <i class="fas fa-graduation-cap"></i>
            <span>Student</span>
          </div>
          <div class="role-card" data-role="team">
            <i class="fas fa-users"></i>
            <span>Team</span>
          </div>
          <div class="role-card" data-role="admin">
            <i class="fas fa-shield-halved"></i>
            <span>Admin</span>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <div class="spinner" id="spinner"></div>
        <span id="btnText"><i class="fas fa-arrow-right"></i> Sign In</span>
      </button>

    </form>

    <div class="divider"><span>or</span></div>

    <div class="signup-row">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>

  </div>

  <script>
  (() => {
    /* ── THEME ── */
    const html = document.documentElement;
    const tBtn = document.getElementById('themeToggle');
    applyTheme(localStorage.getItem('clustr-theme') || 'light');
    function applyTheme(t) {
      html.setAttribute('data-theme', t);
      localStorage.setItem('clustr-theme', t);
      tBtn.querySelector('i').className = t === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }
    tBtn.addEventListener('click', () =>
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    /* ── PASSWORD TOGGLE ── */
    const pwInput = document.getElementById('password');
    const pwIcon  = document.getElementById('pwIcon');
    document.getElementById('togglePw').addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      pwIcon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    /* ── ROLE CARDS ── */
    const roleSelect = document.getElementById('role');
    let selectedRole = '';

    document.getElementById('roleGrid').addEventListener('click', e => {
      const card = e.target.closest('.role-card');
      if (!card) return;
      document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedRole = card.dataset.role;
      roleSelect.value = selectedRole;
    });

    /* ── ERROR ── */
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    /* ── LOADING ── */
    const submitBtn = document.getElementById('submitBtn');
    const spinner   = document.getElementById('spinner');
    const btnText   = document.getElementById('btnText');
    function setLoading(on) {
      submitBtn.disabled    = on;
      spinner.style.display = on ? 'block' : 'none';
      btnText.style.display = on ? 'none'  : 'flex';
    }

    /* ── SUBMIT ── */
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = pwInput.value;
      if (!email || !password) { showError('Please fill in all fields.'); return; }
      if (!selectedRole)        { showError('Please select your role.');   return; }

      setLoading(true);
      try {
        const res  = await fetch('http://localhost:5000/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password, role: selectedRole }),
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('user', JSON.stringify({
            id:    data.user.id || data.user._id,
            _id:   data.user._id || data.user.id,
            email: data.user.email,
            name:  data.user.name || email.split('@')[0],
            role:  data.user.role || selectedRole,
          }));
          setLoading(false);
          document.getElementById('successOverlay').classList.add('show');
          setTimeout(() => {
            if (selectedRole === 'admin')      location.href = 'admin-dashboard.html';
            else if (selectedRole === 'team')  location.href = 'portal.html';
            else                               location.href = 'student-dashboard.html';
          }, 1500);
        } else {
          throw new Error(data.message || 'Invalid credentials. Please try again.');
        }
      } catch (err) {
        showError(err.message || 'Server error. Try again later.');
      } finally {
        setLoading(false);
      }
    });
  })();
  </script>
</body>
</html>
